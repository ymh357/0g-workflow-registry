name: gemini-text
version: 1.0.0
type: pipeline
description: Full-stack frontend pipeline using Gemini CLI, driven by free-text task description (no Notion)
author: 0g-workflow
tags:
  - gemini
  - text-input
  - quick
engine_compat: gemini
dependencies:
  hooks:
    - format-on-write
    - safety-guard
    - protect-files
  skills:
    - security-review
    - performance-audit
    - web3-check
    - systematic-debugging
    - finishing-branch
files:
