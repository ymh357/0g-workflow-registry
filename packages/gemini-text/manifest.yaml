  - prompts/global-constraints.md
  - prompts/system/analysis.md
  - prompts/system/implementation-plan.md
  - prompts/system/implementation.md
  - prompts/system/quality-assurance.md
  - prompts/system/spec-generation.md
  - prompts/system/tech-prep.md
